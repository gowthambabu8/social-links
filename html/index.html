<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gowtham | Social Links</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 48px;
      font-weight: bold;
    }
    h1 { color: #333; margin-bottom: 8px; }
    .title { color: #666; margin-bottom: 30px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .link {
      display: block;
      padding: 14px 20px;
      background: #f5f5f5;
      color: #333;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .link:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">G</div>
    <h1>Gowtham</h1>
    <p class="title">AWS DevOps & Platform Engineer </p>
    <div class="links">
      <a class="link" href="https://github.com/gowthambabu8" target="_blank">GitHub</a>
      <a class="link" href="https://linkedin.com/in/gowthambabu8" target="_blank">LinkedIn</a>
      <a class="link" href="https://twitter.com/your-handle" target="_blank">Twitter / X</a>
      <a class="link" href="mailto:gowthambabu8@gmail.com">Email</a>
      <a class="link" href="https://medium.com/" target="_blank">Medium Blog</a>
      <a class="link" href="https://www.youtube.com/@gowthambabu1594" target="_blank">Youtube</a>
    </div>
  </div>
</body>
</html>

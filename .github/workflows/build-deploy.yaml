name: Build and Deploy
 
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'html/**'
      - 'nginx/**'
      - 'Dockerfile'
      - '.github/workflows/build-deploy.yaml'
 
permissions:
  contents: write     # required to commit the manifest update
 
env:
  DOCKERHUB_REPO: social-links
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Generate image tag
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
 
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
 
      - name: Update image tag in overlay
        working-directory: k8s/overlays/prod
        run: |
          kustomize edit set image social-links-image=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:${{ needs.build-and-push.outputs.image-tag }}
 
      - name: Commit and push
        run: |
          git config user.name "gowtham"
          git config user.email "gowthambabu8@gmail.com"
          git add k8s/overlays/prod/kustomization.yaml
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: bump image to ${{ needs.build-and-push.outputs.image-tag }} [skip ci]"
          git push
